<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自媒体数据助手 v2.8</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text: #333;
            --text2: #999;
            --line: #eee;
            --accent: #333;
            --success: #4caf50;
            --danger: #f44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 32px 16px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--line);
        }
        .header h1 { 
            font-size: 22px; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header p { 
            font-size: 13px; 
            color: var(--text2);
            margin-top: 4px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px;
        }
        
        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--card);
        }
        input[type="date"] {
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="date"]::-webkit-date-and-time-value {
            text-align: left;
        }
        input[type="date"]::-webkit-datetime-edit { color: #333; }
        input[type="date"]::-webkit-datetime-edit-fields-wrapper { color: #333; }
        input[type="date"]::-webkit-datetime-edit-text,
        input[type="date"]::-webkit-datetime-edit-month-field,
        input[type="date"]::-webkit-datetime-edit-day-field,
        input[type="date"]::-webkit-datetime-edit-year-field { color: #333; }
        .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg);
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }
        .btn-primary:active { opacity: 0.8; }
        
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }
        
        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }
        .btn-large:active { opacity: 0.85; }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text2);
        }
        
        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
            background: transparent;
        }
        
        .stat-row {
            display: flex;
            gap: 12px;
            margin-bottom: 0;
        }
        .stat-row .form-group { flex: 1; margin-bottom: 16px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            border-top: 1px solid var(--line);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            padding: 4px 12px;
            cursor: pointer;
            color: var(--text2);
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item .icon { font-size: 20px; }
        .nav-item .label { font-size: 10px; margin-top: 4px; font-weight: 500; }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .tag-valid { background: #e8f5e9; color: var(--success); }
        .tag-invalid { background: #fce4ec; color: var(--danger); }
        
        .record-item {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--line);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .record-title { font-weight: 500; font-size: 15px; }
        .record-meta {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
        }
        
        .tip-box {
            background: var(--bg);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text2);
        }
        
        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--line);
        }
        .stat-card .num {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -1px;
        }
        .stat-card .label {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .danger-zone {
            border: 1px solid #ffcdd2;
            background: #fff8f8;
        }
        
        .input-file-label {
            display: block;
            padding: 16px;
            background: var(--bg);
            border: 1px dashed var(--line);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-file-label:active {
            background: var(--line);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>自媒体数据助手</h1>
        <p>记录 · 验证 · 复盘</p>
    </div>
    
    <div class="container">
        <!-- 首页：数据录入 -->
        <div id="page-home" class="tab-content active">
            <div class="grid-2" style="margin-bottom:20px;">
                <div class="stat-card">
                    <div class="num" id="home-total">0</div>
                    <div class="label">总记录</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="home-valid" style="color:var(--success)">0</div>
                    <div class="label">有效内容</div>
                </div>
            </div>

            <!-- 待录入提醒 -->
            <div id="reminder-panel" class="tip-box" style="display:none;margin-bottom:16px;background:#fff8e1;border:1px solid #ffc107;">
                <div style="font-weight:600;margin-bottom:8px;color:#f57c00;">📋 今日待录入</div>
                <div id="reminder-list"></div>
            </div>

            <div class="section-title">录入数据</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" id="record-date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" id="record-title" class="form-input" placeholder="内容标题" oninput="checkTitleDup()">
                    <p id="title-hint" style="font-size:12px;color:var(--text2);margin-top:4px;display:none;"></p>
                </div>
                <div class="form-group">
                    <label class="form-label">方向</label>
                    <select id="record-direction" class="form-select">
                        <option value="">选择方向</option>
                        <option value="心理学">心理学</option>
                        <option value="经济学">经济学</option>
                        <option value="认知提升">认知提升</option>
                        <option value="行为经济学">行为经济学</option>
                        <option value="社会观察">社会观察</option>
                        <option value="人际关系">人际关系</option>
                        <option value="自我成长">自我成长</option>
                        <option value="博弈论">博弈论</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">平台</label>
                    <select id="record-platform" class="form-select">
                        <option value="抖音">抖音</option>
                        <option value="小红书">小红书</option>
                        <option value="B站">B站</option>
                        <option value="快手">快手</option>
                        <option value="微博">微博</option>
                        <option value="TikTok">TikTok</option>
                    </select>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">播放</label>
                        <input type="number" id="record-views" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">评论</label>
                        <input type="number" id="record-comments" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">点赞</label>
                        <input type="number" id="record-likes" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">收藏</label>
                        <input type="number" id="record-saves" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">转发</label>
                    <input type="number" id="record-shares" class="form-input" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea id="record-script" class="form-input" rows="2" placeholder="可选"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveRecord()">保存</button>
            </div>
        </div>
        
        <!-- 评论页 -->
        <div id="page-comment" class="tab-content">
            <div class="section-title">评论收集</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">关联内容</label>
                    <select id="comment-record" class="form-select">
                        <option value="">请先录入内容</option>
                    </select>
                </div>
                
                <!-- 四个分类输入框 -->
                <div class="form-group">
                    <label class="form-label" style="color:#e53935;">🔴 需求（有痛点）</label>
                    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">用户有具体问题要解决，如：怎么解决焦虑？能帮到我吗？</div>
                    <textarea id="comment-need" class="form-input" rows="3" placeholder="连续粘贴多条评论，每条一行..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" style="color:#43a047;">🟢 认可</label>
                    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">点赞、感谢、共鸣，如：说得太对了！感谢分享！</div>
                    <textarea id="comment-approve" class="form-input" rows="3" placeholder="连续粘贴多条评论，每条一行..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" style="color:#757575;">⚪ 中立（无意义）</label>
                    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">无实质内容的评论，如：哈哈哈、已阅、沙发</div>
                    <textarea id="comment-neutral" class="form-input" rows="3" placeholder="连续粘贴多条评论，每条一行..."></textarea>
                </div>
                
                <div class="form-group">
                    <label class="form-label" style="color:#fb8c00;">🟠 质疑</label>
                    <div style="font-size:12px;color:var(--text2);margin-bottom:6px;">反对、挑战、追问，如：这不科学、举个例子？</div>
                    <textarea id="comment-doubt" class="form-input" rows="3" placeholder="连续粘贴多条评论，每条一行..."></textarea>
                </div>
                
                <!-- 操作按钮 -->
                <div style="display:flex;gap:12px;margin-top:16px;">
                    <button class="btn btn-primary" onclick="saveComments()" style="flex:1;">💾 保存数据</button>
                    <button class="btn btn-primary" onclick="exportComments()" style="flex:1;background:var(--accent);">📋 导出评论</button>
                </div>
            </div>
            
            <!-- 评论统计 -->
            <div id="comment-stats" style="margin-top:16px;"></div>
        </div>
        
        <!-- 方向页 -->
        <div id="page-direction" class="tab-content">
            <div class="section-title">方向验证</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">方向</label>
                    <select id="direction-name" class="form-select">
                        <option value="">选择方向</option>
                        <option value="心理学">心理学</option>
                        <option value="经济学">经济学</option>
                        <option value="认知提升">认知提升</option>
                        <option value="行为经济学">行为经济学</option>
                        <option value="社会观察">社会观察</option>
                        <option value="人际关系">人际关系</option>
                        <option value="自我成长">自我成长</option>
                        <option value="博弈论">博弈论</option>
                    </select>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">内容数量</label>
                        <input type="number" id="direction-count" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">有效内容</label>
                        <input type="number" id="direction-valid" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="tip-box">有效标准：评论率≥3% 或 收藏率≥2%</div>
                <div class="form-group" style="margin-top:16px;">
                    <label class="form-label">备注</label>
                    <textarea id="direction-note" class="form-input" rows="2"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveDirection()">保存</button>
            </div>
            <div id="direction-list"></div>
        </div>
        
        <!-- 历史页 -->
        <div id="page-history" class="tab-content">
            <div class="section-title">历史记录</div>
            <div id="history-list"></div>
        </div>
        
        <!-- 输出页 -->
        <div id="page-export" class="tab-content">
            <div class="section-title">一键分析</div>
            <div class="card" style="text-align:center;">
                <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">复制全部数据，粘贴发给我分析入库</p>
                <button class="btn-large" onclick="copyAllData()" style="background:var(--success);color:white;">📋 一键复制全部数据</button>
            </div>
            
            <div class="section-title">数据统计</div>
            <div class="grid-2">
                <div class="stat-card">
                    <div class="num" id="valid-count">0</div>
                    <div class="label">有效内容</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="total-count">0</div>
                    <div class="label">总记录</div>
                </div>
            </div>
            
            <div class="section-title">导出备份</div>
            <div class="card">
                <button class="btn-large" onclick="exportData()" style="background:var(--accent);color:white;">📦 导出 JSON</button>
                <button class="btn-large" onclick="exportMarkdown()" style="background:var(--bg);color:var(--text);border:1px solid var(--line);">📝 导出 Markdown</button>
            </div>
            
            <div class="section-title">导入备份</div>
            <div class="card">
                <label class="input-file-label">
                    📁 点击选择文件（可多选）
                    <input type="file" id="import-file" accept=".json" multiple onchange="importData(event)" style="display:none;">
                </label>
                <p style="font-size:12px;color:var(--text2);margin-top:12px;text-align:center;">支持多文件导入，自动合并去重</p>
            </div>
            
            <div class="section-title">危险区域</div>
            <div class="card danger-zone">
                <button class="btn-small btn-danger" onclick="clearAllData()">清空所有数据</button>
            </div>
        </div>
        
        <!-- 周复盘页 -->
        <div id="page-weekly" class="tab-content">
            <div class="section-title">周复盘</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">周期</label>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <input type="date" id="week-start" class="form-input" style="flex:1;">
                        <span style="color:var(--text2)">至</span>
                        <input type="date" id="week-end" class="form-input" style="flex:1;">
                    </div>
                </div>
                <div id="weekly-stats" class="tip-box" style="margin-bottom:16px;">
                    选择周期后自动统计
                </div>
                <div class="form-group">
                    <label class="form-label">本周重点内容</label>
                    <textarea id="week-focus" class="form-input" rows="2" placeholder="本周做了哪些内容？"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">有效内容分析</label>
                    <textarea id="week-analysis" class="form-input" rows="2" placeholder="哪些内容表现好？"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">下周计划</label>
                    <textarea id="week-plan" class="form-input" rows="2" placeholder="下周方向调整？"></textarea>
                </div>
                <div style="display:flex;gap:12px;">
                    <button class="btn btn-primary" style="flex:1;" onclick="saveWeekly()">保存</button>
                    <button class="btn btn-secondary" style="flex:1;" onclick="exportWeekly()">📋 导出</button>
                </div>
            </div>
            <div id="weekly-history"></div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <div class="icon">📝</div>
            <div class="label">录入</div>
        </div>
        <div class="nav-item" onclick="switchTab('comment', this)">
            <div class="icon">💬</div>
            <div class="label">评论</div>
        </div>
        <div class="nav-item" onclick="switchTab('direction', this)">
            <div class="icon">🧭</div>
            <div class="label">方向</div>
        </div>
        <div class="nav-item" onclick="switchTab('history', this)">
            <div class="icon">📋</div>
            <div class="label">历史</div>
        </div>
        <div class="nav-item" onclick="switchTab('weekly', this)">
            <div class="icon">📅</div>
            <div class="label">周复盘</div>
        </div>
        <div class="nav-item" onclick="switchTab('export', this)">
            <div class="icon">📤</div>
            <div class="label">输出</div>
        </div>
    </div>

<script>
    const KEYS = {
        records: 'media_records',
        comments: 'media_comments', 
        directions: 'media_directions',
        weeklyReviews: 'media_weekly_reviews'
    };
    
    const DIRECTIONS = ['心理学', '经济学', '认知提升', '行为经济学', '社会观察', '人际关系', '自我成长', '博弈论'];
    
    function getData(key) {
        const data = localStorage.getItem(KEYS[key] || key);
        return data ? JSON.parse(data) : [];
    }
    
    function saveData(key, data) {
        localStorage.setItem(KEYS[key] || key, JSON.stringify(data));
    }
    
    function formatNumber(num) {
        if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num;
    }
    
    function switchTab(name, el) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        el.classList.add('active');
        
        if (name === 'history') loadHistory();
        if (name === 'home') updateHome();
        if (name === 'comment') updateCommentSelect();
        if (name === 'direction') loadDirections();
        if (name === 'weekly') loadWeeklyStats();
        if (name === 'export') updateExportStats();
    }
    
    function updateHome() {
        const records = getData('records');
        document.getElementById('record-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('home-total').textContent = records.length;
        document.getElementById('home-valid').textContent = records.filter(r => r.isValid).length;
        renderReminder(); // 待录入提醒
    }

    // 标题重复检测
    function checkTitleDup() {
        const title = document.getElementById('record-title').value.trim();
        const hint = document.getElementById('title-hint');
        if (!title) {
            hint.style.display = 'none';
            return;
        }
        const records = getData('records');
        const existing = records.filter(r => r.title === title);
        if (existing.length > 0) {
            hint.textContent = `已有${existing.length}条记录，保存时将追加数据`;
            hint.style.display = 'block';
        } else {
            hint.textContent = '新标题，保存时创建新记录';
            hint.style.display = 'block';
        }
    }
    
    // 预览检测结果
    function previewSave() {
        const title = document.getElementById('record-title').value.trim();
        const platform = document.getElementById('record-platform').value;
        const views = document.getElementById('record-views').value;

    function renderReminder() {
        const records = getData('records');
        const today = new Date().toISOString().split('T')[0];
        const panel = document.getElementById('reminder-panel');
        const list = document.getElementById('reminder-list');

        // 按标题分组
        const titleMap = new Map();
        records.forEach(r => {
            if (!titleMap.has(r.title)) {
                titleMap.set(r.title, { title: r.title, firstDate: r.date, platform: r.platform });
            } else {
                const existing = titleMap.get(r.title);
                if (r.date < existing.firstDate) existing.firstDate = r.date;
            }
        });

        const reminders = [];
        titleMap.forEach((info, title) => {
            const firstDate = new Date(info.firstDate);
            const daysSince = Math.floor((new Date(today) - firstDate) / (1000 * 60 * 60 * 24));
            let needRecord = false, reason = '';

            if (daysSince <= 3) {
                const todayRecords = records.filter(r => r.title === title && r.date === today);
                if (todayRecords.length === 0) {
                    needRecord = true;
                    reason = `第${daysSince + 1}天`;
                }
            } else if (daysSince <= 7 && daysSince % 2 === 1) {
                needRecord = true;
                reason = `第${daysSince + 1}天`;
            }

            if (needRecord) reminders.push({ ...info, reason });
        });

        if (reminders.length === 0) { panel.style.display = 'none'; return; }

        panel.style.display = 'block';
        list.innerHTML = reminders.slice(0, 5).map(r =>
            `<div onclick="document.getElementById('record-title').value='${r.title.replace(/'/g, "\\'")}';" style="cursor:pointer;padding:4px 0;border-bottom:1px dashed #d97706;display:flex;justify-content:space-between;">
                <span style="text-decoration:underline;">${r.title}</span>
                <span style="font-size:11px;">${r.reason}</span>
            </div>`
        ).join('');
    }

            return text.split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => ({
                    id: Date.now() + Math.random(),

                    content: line,
                    type,
                    createdAt: new Date().toISOString()

    function importData(event) {
        const files = Array.from(event.target.files);
        if (files.length === 0) return;
        
        // 合并后的数据容器
        let mergedData = {
            records: [],
            comments: [],
            directions: [],
            weeklyReviews: []
        };
        let successCount = 0;
        let failCount = 0;
        
        // 读取所有文件的Promise
        const readPromises = files.map(file => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        resolve({ success: true, data });
                    } catch (err) {
                        resolve({ success: false, filename: file.name });
                    }
                };
                reader.onerror = () => resolve({ success: false, filename: file.name });
                reader.readAsText(file);
            });
        });
        
        // 合并所有文件数据
        Promise.all(readPromises).then(results => {
            results.forEach(result => {
                if (result.success) {
                    const d = result.data;
                    if (d.records) mergedData.records.push(...d.records);
                    if (d.comments) mergedData.comments.push(...d.comments);
                    if (d.directions) mergedData.directions.push(...d.directions);
                    if (d.weeklyReviews) mergedData.weeklyReviews.push(...d.weeklyReviews);
                    successCount++;
                } else {
                    failCount++;
                }
            });
            
            // 按ID去重合并
            const mergeById = (existing, newItems, key = 'id') => {
                const map = new Map();
                existing.forEach(item => map.set(item[key], item));
                newItems.forEach(item => {
                    // 如果有重复ID，保留时间戳更新的（或用新数据覆盖）
                    const existing = map.get(item[key]);
                    if (!existing || (item.timestamp && existing.timestamp && new Date(item.timestamp) > new Date(existing.timestamp))) {
                        map.set(item[key], item);
                    } else if (!existing) {
                        map.set(item[key], item);
                    }
                });
                return Array.from(map.values());
            };
            
            // 与现有数据合并
            const existingRecords = getData('records');
            const existingComments = getData('comments');
            const existingDirections = getData('directions');
            const existingWeekly = getData('weeklyReviews');
            
            const finalRecords = mergeById(existingRecords, mergedData.records);
            const finalComments = mergeById(existingComments, mergedData.comments, 'id');
            const finalDirections = mergeById(existingDirections, mergedData.directions, 'id');
            const finalWeekly = mergeById(existingWeekly, mergedData.weeklyReviews, 'id');
            
            saveData('records', finalRecords);
            saveData('comments', finalComments);
            saveData('directions', finalDirections);
            saveData('weeklyReviews', finalWeekly);
            
            // 清空input让用户可以再次选择同一文件
            event.target.value = '';
            
            alert(`导入完成！\n成功：${successCount}个文件\n失败：${failCount}个文件\n\n合并后：${finalRecords.length}条记录`);
            location.reload();
        });
    }

        });
        container.innerHTML = html;
    }
    
    function deleteWeekly(id) {
        if (!confirm('确定删除？')) return;
        let reviews = getData('weeklyReviews');
        reviews = reviews.filter(r => r.id !== id);
        saveData('weeklyReviews', reviews);
        loadWeeklyHistory();
    }
    
    updateHome();
</script>
