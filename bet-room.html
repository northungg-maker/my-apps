<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对赌房间 - 用代价逼出执行力</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 16px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 24px 0;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #8892b0;
            font-size: 14px;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 6px;
            border-radius: 12px;
        }
        
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .section {
            display: none;
        }
        
        .section.active {
            display: block;
        }
        
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0aec0;
            font-size: 13px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 14px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        @media (max-width: 400px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
        
        .form-group input[type="date"],
        .form-group input[type="time"] {
            min-width: 0;
            width: 100%;
            box-sizing: border-box;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%);
            color: #fff;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: #fff;
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* Room Status */
        .room-status {
            text-align: center;
            padding: 20px;
        }
        
        .countdown {
            font-size: 48px;
            font-weight: 700;
            margin: 16px 0;
            font-family: 'SF Mono', monospace;
        }
        
        .countdown.urgent {
            color: #f5576c;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .goal-display {
            background: rgba(0,0,0,0.3);
            padding: 16px;
            border-radius: 12px;
            margin: 16px 0;
        }
        
        .goal-display h3 {
            color: #667eea;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .goal-display p {
            font-size: 18px;
            line-height: 1.5;
        }
        
        .stake-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            background: rgba(245, 87, 108, 0.2);
            border-radius: 8px;
            margin-top: 16px;
        }
        
        .participants {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }
        
        .participant {
            text-align: center;
        }
        
        .participant-avatar {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 8px;
        }
        
        .participant-role {
            font-size: 12px;
            color: #8892b0;
        }
        
        .participant-name {
            font-size: 14px;
            font-weight: 500;
        }
        
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        
        /* History */
        .history-item {
            display: flex;
            align-items: center;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
            margin-bottom: 12px;
        }
        
        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        .history-icon.win {
            background: rgba(17, 153, 142, 0.2);
            color: #38ef7d;
        }
        
        .history-icon.lose {
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
        }
        
        .history-content {
            flex: 1;
        }
        
        .history-title {
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .history-meta {
            font-size: 12px;
            color: #8892b0;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            width: 100%;
            max-width: 400px;
        }
        
        .modal-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .modal-body {
            margin-bottom: 20px;
        }
        
        .modal-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8892b0;
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #8892b0;
        }
        
        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }
        
        .status-badge.active {
            background: rgba(17, 153, 142, 0.2);
            color: #38ef7d;
        }
        
        .status-badge.completed {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        
        .status-badge.failed {
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
        }
        
        .room-code-display {
            text-align: center;
            margin: 20px 0;
        }
        
        .room-code {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 8px;
            color: #667eea;
        }
        
        .room-code-label {
            font-size: 12px;
            color: #8892b0;
            margin-top: 8px;
        }
        
        .share-hint {
            font-size: 13px;
            color: #a0aec0;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ 对赌房间</h1>
            <p>用代价逼出执行力</p>
            <p style="color: #38ef7d; font-size: 12px; margin-top: 4px;">✨ 云端同步版 · 支持跨设备</p>
        </div>
        
        <!-- 未进入房间时显示 -->
        <div id="lobby-view">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('create')">创建房间</div>
                <div class="tab" onclick="switchTab('join')">加入房间</div>
                <div class="tab" onclick="switchTab('history')">历史记录</div>
            </div>
            
            <!-- 创建房间 -->
            <div id="section-create" class="section active">
                <div class="card">
                    <div class="form-group">
                        <label>🎯 目标任务</label>
                        <textarea id="goal" rows="3" placeholder="例如：每天运动30分钟，坚持7天"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>📅 截止日期</label>
                            <input type="date" id="deadline-date">
                        </div>
                        <div class="form-group">
                            <label>⏰ 截止时间</label>
                            <input type="time" id="deadline-time" value="23:59">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>💎 赌注类型</label>
                        <select id="stake-type">
                            <option value="money">💰 现金</option>
                            <option value="item">🎁 物品</option>
                            <option value="promise">📝 承诺</option>
                            <option value="other">✨ 其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>💵 赌注内容</label>
                        <input type="text" id="stake-value" placeholder="例如：请监督方吃顿大餐">
                    </div>
                    <div class="form-group">
                        <label>👤 你的身份</label>
                        <select id="my-role">
                            <option value="executor">执行方 - 我来做，你来监督</option>
                            <option value="supervisor">监督方 - 他来做，我来监督</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
                </div>
            </div>
            
            <!-- 加入房间 -->
            <div id="section-join" class="section">
                <div class="card">
                    <div class="form-group">
                        <label>🔐 输入房间号</label>
                        <input type="text" id="join-code" placeholder="6位房间号（如：ABC123）" maxlength="6" style="text-transform: uppercase; text-align: center; font-size: 24px; letter-spacing: 4px;">
                    </div>
                    <button class="btn btn-primary" onclick="joinRoom()">加入房间</button>
                </div>
            </div>
            
            <!-- 历史记录 -->
            <div id="section-history" class="section">
                <div id="history-list">
                    <div class="loading">加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 房间状态视图 -->
        <div id="room-view" style="display: none;">
            <div class="card">
                <div class="room-status">
                    <span id="room-status-badge" class="status-badge pending">等待开始</span>
                </div>
                
                <div class="goal-display">
                    <h3>🎯 目标</h3>
                    <p id="room-goal">-</p>
                </div>
                
                <div id="room-code-section" style="display: none;">
                    <div class="room-code-display">
                        <div class="room-code" id="display-room-code">ABC123</div>
                        <div class="room-code-label">房间号（发给对方加入）</div>
                    </div>
                </div>
                
                <div class="countdown" id="countdown">00:00:00</div>
                
                <div class="stake-display">
                    <span>💎 赌注：</span>
                    <span id="room-stake">-</span>
                </div>
                
                <div class="participants" id="participants">
                    <!-- 参与者信息将动态填充 -->
                </div>
                
                <div id="waiting-message" style="text-align: center; color: #8892b0; padding: 20px;">
                    等待对方加入...
                </div>
                
                <div class="actions" id="room-actions" style="display: none;">
                    <button class="btn btn-success" onclick="confirmComplete()">✓ 我完成了</button>
                    <button class="btn btn-danger" onclick="showGiveUp()">✗ 认输</button>
                </div>
                
                <div id="supervisor-actions" style="display: none; text-align: center; padding: 20px;">
                    <p style="color: #8892b0; margin-bottom: 12px;">你是监督方，等待执行方完成</p>
                    <button class="btn btn-secondary" onclick="exitRoom()">离开房间</button>
                </div>
                
                <div id="result-section" style="display: none; text-align: center; padding: 20px;">
                    <div id="result-icon" style="font-size: 64px; margin-bottom: 16px;">🎉</div>
                    <div id="result-text" style="font-size: 18px; font-weight: 600;">-</div>
                    <button class="btn btn-secondary" style="margin-top: 20px;" onclick="exitRoom()">返回大厅</button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- 完成确认模态框 -->
    <div id="complete-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🎉 确认完成？</div>
            <div class="modal-body">
                <p style="text-align: center; color: #a0aec0;">确定你已经完成了目标任务吗？</p>
                <p style="text-align: center; color: #38ef7d; margin-top: 12px;">完成后你将赢得赌注！</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('complete-modal')">再想想</button>
                <button class="btn btn-success" onclick="submitComplete()">确认完成</button>
            </div>
        </div>
    </div>
    
    <!-- 认输确认模态框 -->
    <div id="giveup-modal" class="modal">
        <div class="modal-content">
            <div class="modal-title">😢 确认认输？</div>
            <div class="modal-body">
                <p style="text-align: center; color: #a0aec0;">确定要放弃吗？</p>
                <p style="text-align: center; color: #f5576c; margin-top: 12px;">认输后你将输掉赌注！</p>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeModal('giveup-modal')">再坚持一下</button>
                <button class="btn btn-danger" onclick="submitGiveUp()">确认认输</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-database.js";
        
        // Firebase 配置
        const firebaseConfig = {
            apiKey: "AIzaSyBkRmTcZzV0qNF0Q5mKR0H7qzIYLJgN4VY",
            authDomain: "betroom-4f5e9.firebaseapp.com",
            databaseURL: "https://betroom-4f5e9-default-rtdb.firebaseio.com",
            projectId: "betroom-4f5e9",
            storageBucket: "betroom-4f5e9.appspot.com",
            messagingSenderId: "493247133030",
            appId: "1:493247133030:web:4b29ebcf3a76a50a6c8f43"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // 当前状态
        let currentRoomId = null;
        let currentRole = null;
        let countdownInterval = null;
        let roomListener = null;
        
        // 生成房间号
        function generateRoomId() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let result = '';
            for (let i = 0; i < 6; i++) {
                result += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return result;
        }
        
        // 切换标签
        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            document.querySelector('.tab:nth-child(' + (tab === 'create' ? 1 : tab === 'join' ? 2 : 3) + ')').classList.add('active');
            document.getElementById('section-' + tab).classList.add('active');
            
            if (tab === 'history') {
                renderHistory();
            }
        };
        
        // 创建房间
        window.createRoom = async function() {
            const goal = document.getElementById('goal').value.trim();
            const deadlineDate = document.getElementById('deadline-date').value;
            const deadlineTime = document.getElementById('deadline-time').value;
            const stakeType = document.getElementById('stake-type').value;
            const stakeValue = document.getElementById('stake-value').value.trim();
            const myRole = document.getElementById('my-role').value;
            
            if (!goal || !deadlineDate || !stakeValue) {
                alert('请填写完整信息');
                return;
            }
            
            const deadline = new Date(`${deadlineDate}T${deadlineTime}`);
            if (deadline <= new Date()) {
                alert('截止时间必须在未来');
                return;
            }
            
            const roomId = generateRoomId();
            const roomData = {
                id: roomId,
                goal: goal,
                deadline: deadline.getTime(),
                stakeType: stakeType,
                stakeValue: stakeValue,
                status: 'waiting',
                createdAt: Date.now(),
                executor: myRole === 'executor' ? 'creator' : null,
                supervisor: myRole === 'supervisor' ? 'creator' : null,
                result: null
            };
            
            try {
                await set(ref(db, 'rooms/' + roomId), roomData);
                currentRoomId = roomId;
                currentRole = myRole;
                enterRoom(roomId);
            } catch (error) {
                alert('创建失败：' + error.message);
            }
        };
        
        // 加入房间
        window.joinRoom = async function() {
            const code = document.getElementById('join-code').value.trim().toUpperCase();
            if (code.length !== 6) {
                alert('请输入6位房间号');
                return;
            }
            
            try {
                const snapshot = await get(ref(db, 'rooms/' + code));
                if (!snapshot.exists()) {
                    alert('房间不存在');
                    return;
                }
                
                const room = snapshot.val();
                if (room.status !== 'waiting') {
                    alert('该房间已开始或已结束');
                    return;
                }
                
                // 确定角色
                let myRole;
                if (!room.executor && room.supervisor) {
                    myRole = 'executor';
                    await update(ref(db, 'rooms/' + code), { executor: 'joiner', status: 'active' });
                } else if (room.executor && !room.supervisor) {
                    myRole = 'supervisor';
                    await update(ref(db, 'rooms/' + code), { supervisor: 'joiner', status: 'active' });
                } else {
                    alert('该房间已满');
                    return;
                }
                
                currentRoomId = code;
                currentRole = myRole;
                enterRoom(code);
            } catch (error) {
                alert('加入失败：' + error.message);
            }
        };
        
        // 进入房间
        function enterRoom(roomId) {
            document.getElementById('lobby-view').style.display = 'none';
            document.getElementById('room-view').style.display = 'block';
            
            // 监听房间变化
            roomListener = onValue(ref(db, 'rooms/' + roomId), (snapshot) => {
                if (snapshot.exists()) {
                    updateRoomDisplay(snapshot.val());
                } else {
                    alert('房间已关闭');
                    exitRoom();
                }
            });
        }
        
        // 更新房间显示
        function updateRoomDisplay(room) {
            document.getElementById('room-goal').textContent = room.goal;
            document.getElementById('room-stake').textContent = room.stakeValue;
            document.getElementById('display-room-code').textContent = room.id;
            
            // 状态徽章
            const badge = document.getElementById('room-status-badge');
            badge.className = 'status-badge ' + room.status;
            const statusText = {
                'waiting': '等待加入',
                'active': '进行中',
                'completed': '已完成',
                'failed': '已失败'
            };
            badge.textContent = statusText[room.status] || room.status;
            
            // 参与者显示
            const participantsDiv = document.getElementById('participants');
            participantsDiv.innerHTML = `
                <div class="participant">
                    <div class="participant-avatar">${room.executor ? '💪' : '?'}</div>
                    <div class="participant-role">执行方</div>
                    <div class="participant-name">${room.executor ? (room.executor === 'creator' ? '创建者' : '参与者') : '等待加入'}</div>
                </div>
                <div class="participant">
                    <div class="participant-avatar">${room.supervisor ? '👀' : '?'}</div>
                    <div class="participant-role">监督方</div>
                    <div class="participant-name">${room.supervisor ? (room.supervisor === 'creator' ? '创建者' : '参与者') : '等待加入'}</div>
                </div>
            `;
            
            // 根据状态显示不同内容
            if (room.status === 'waiting') {
                document.getElementById('room-code-section').style.display = 'block';
                document.getElementById('waiting-message').style.display = 'block';
                document.getElementById('room-actions').style.display = 'none';
                document.getElementById('supervisor-actions').style.display = 'none';
                document.getElementById('result-section').style.display = 'none';
                document.getElementById('countdown').textContent = '--:--:--';
            } else if (room.status === 'active') {
                document.getElementById('room-code-section').style.display = 'none';
                document.getElementById('waiting-message').style.display = 'none';
                document.getElementById('result-section').style.display = 'none';
                
                if (currentRole === 'executor') {
                    document.getElementById('room-actions').style.display = 'grid';
                    document.getElementById('supervisor-actions').style.display = 'none';
                } else {
                    document.getElementById('room-actions').style.display = 'none';
                    document.getElementById('supervisor-actions').style.display = 'block';
                }
                
                // 开始倒计时
                startCountdown(room.deadline);
            } else if (room.status === 'completed' || room.status === 'failed') {
                clearInterval(countdownInterval);
                document.getElementById('room-actions').style.display = 'none';
                document.getElementById('supervisor-actions').style.display = 'none';
                document.getElementById('result-section').style.display = 'block';
                
                if (room.status === 'completed') {
                    document.getElementById('result-icon').textContent = '🎉';
                    document.getElementById('result-text').textContent = '目标达成！执行方获胜';
                    document.getElementById('result-text').style.color = '#38ef7d';
                } else {
                    document.getElementById('result-icon').textContent = '😢';
                    document.getElementById('result-text').textContent = '任务失败！需要兑现赌注';
                    document.getElementById('result-text').style.color = '#f5576c';
                }
                
                // 保存到历史
                saveToHistory(room);
            }
        }
        
        // 开始倒计时
        function startCountdown(deadline) {
            clearInterval(countdownInterval);
            
            countdownInterval = setInterval(() => {
                const now = Date.now();
                const diff = deadline - now;
                
                if (diff <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('countdown').textContent = '00:00:00';
                    // 时间到，标记失败
                    if (currentRole === 'executor') {
                        submitGiveUp(true);
                    }
                    return;
                }
                
                const hours = Math.floor(diff / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                
                const countdownEl = document.getElementById('countdown');
                countdownEl.textContent = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                
                if (diff < 3600000) {
                    countdownEl.classList.add('urgent');
                } else {
                    countdownEl.classList.remove('urgent');
                }
            }, 1000);
        }
        
        // 确认完成
        window.confirmComplete = function() {
            document.getElementById('complete-modal').classList.add('active');
        };
        
        window.submitComplete = async function() {
            closeModal('complete-modal');
            
            try {
                await update(ref(db, 'rooms/' + currentRoomId), {
                    status: 'completed',
                    result: 'success',
                    completedAt: Date.now()
                });
            } catch (error) {
                alert('提交失败：' + error.message);
            }
        };
        
        // 认输
        window.showGiveUp = function() {
            document.getElementById('giveup-modal').classList.add('active');
        };
        
        window.submitGiveUp = async function(isTimeout = false) {
            if (!isTimeout) {
                closeModal('giveup-modal');
            }
            
            try {
                await update(ref(db, 'rooms/' + currentRoomId), {
                    status: 'failed',
                    result: 'giveup',
                    failedAt: Date.now()
                });
            } catch (error) {
                alert('提交失败：' + error.message);
            }
        };
        
        // 关闭模态框
        window.closeModal = function(id) {
            document.getElementById(id).classList.remove('active');
        };
        
        // 退出房间
        window.exitRoom = function() {
            if (roomListener) {
                // 停止监听
                off(ref(db, 'rooms/' + currentRoomId));
            }
            clearInterval(countdownInterval);
            currentRoomId = null;
            currentRole = null;
            
            document.getElementById('room-view').style.display = 'none';
            document.getElementById('lobby-view').style.display = 'block';
        };
        
        // 保存到历史
        async function saveToHistory(room) {
            const historyKey = 'betHistory_' + localStorage.getItem('userId') || 'default';
            let history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            
            // 检查是否已存在
            if (!history.find(h => h.id === room.id)) {
                history.push({
                    id: room.id,
                    goal: room.goal,
                    stake: room.stakeValue,
                    status: room.status,
                    myRole: currentRole,
                    date: Date.now()
                });
                localStorage.setItem(historyKey, JSON.stringify(history));
            }
        }
        
        // 渲染历史
        window.renderHistory = function() {
            const historyKey = 'betHistory_' + localStorage.getItem('userId') || 'default';
            const history = JSON.parse(localStorage.getItem(historyKey) || '[]');
            
            const container = document.getElementById('history-list');
            
            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📜</div>
                        <p>暂无历史记录</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = history.reverse().map(h => `
                <div class="history-item">
                    <div class="history-icon ${h.status === 'completed' ? 'win' : 'lose'}">
                        ${h.status === 'completed' ? '✓' : '✗'}
                    </div>
                    <div class="history-content">
                        <div class="history-title">${h.goal}</div>
                        <div class="history-meta">
                            赌注：${h.stake} · ${new Date(h.date).toLocaleDateString('zh-CN')}
                        </div>
                    </div>
                </div>
            `).join('');
        };
        
        // 页面加载时设置默认日期
        window.onload = function() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            document.getElementById('deadline-date').value = tomorrow.toISOString().split('T')[0];
            document.getElementById('deadline-date').min = new Date().toISOString().split('T')[0];
            
            // 生成用户ID
            if (!localStorage.getItem('userId')) {
                localStorage.setItem('userId', 'user_' + Math.random().toString(36).substr(2, 9));
            }
        };
    </script>
</body>
</html>
