<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>自媒体数据助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #fafafa;
            --card: #ffffff;
            --text: #333;
            --text2: #999;
            --line: #eee;
            --accent: #333;
            --success: #4caf50;
            --danger: #f44336;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
            background: var(--bg);
            color: var(--text);
            padding-bottom: 80px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }
        .container { padding: 20px 16px; max-width: 600px; margin: 0 auto; }
        
        .header {
            text-align: center;
            padding: 32px 16px 24px;
            background: var(--card);
            border-bottom: 1px solid var(--line);
        }
        .header h1 { 
            font-size: 22px; 
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header p { 
            font-size: 13px; 
            color: var(--text2);
            margin-top: 4px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 24px 0 12px;
        }
        
        .card {
            background: var(--card);
            padding: 16px;
            border-radius: 16px;
            margin-bottom: 12px;
        }
        
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }
        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg);
            transition: border-color 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            background: var(--card);
        }
        .form-select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--line);
            border-radius: 12px;
            font-size: 15px;
            background: var(--bg);
        }
        
        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            width: 100%;
        }
        .btn-primary:active { opacity: 0.8; }
        
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }
        
        .btn-large {
            width: 100%;
            padding: 16px;
            font-size: 15px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: opacity 0.2s;
        }
        .btn-large:active { opacity: 0.85; }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--line);
            background: transparent;
            color: var(--text2);
        }
        
        .btn-danger {
            color: var(--danger);
            border-color: var(--danger);
            background: transparent;
        }
        
        .stat-row {
            display: flex;
            gap: 12px;
            margin-bottom: 0;
        }
        .stat-row .form-group { flex: 1; margin-bottom: 16px; }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            display: flex;
            justify-content: space-around;
            padding: 12px 0 20px;
            border-top: 1px solid var(--line);
            z-index: 100;
        }
        .nav-item {
            text-align: center;
            padding: 4px 12px;
            cursor: pointer;
            color: var(--text2);
            transition: color 0.2s;
        }
        .nav-item.active { color: var(--accent); }
        .nav-item .icon { font-size: 20px; }
        .nav-item .label { font-size: 10px; margin-top: 4px; font-weight: 500; }
        
        .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
        }
        .tag-valid { background: #e8f5e9; color: var(--success); }
        .tag-invalid { background: #fce4ec; color: var(--danger); }
        
        .record-item {
            background: var(--card);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--line);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }
        .record-title { font-weight: 500; font-size: 15px; }
        .record-meta {
            font-size: 13px;
            color: var(--text2);
            line-height: 1.6;
        }
        
        .tip-box {
            background: var(--bg);
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 12px;
            color: var(--text2);
        }
        
        .stat-card {
            background: var(--card);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid var(--line);
        }
        .stat-card .num {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -1px;
        }
        .stat-card .label {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .danger-zone {
            border: 1px solid #ffcdd2;
            background: #fff8f8;
        }
        
        .input-file-label {
            display: block;
            padding: 16px;
            background: var(--bg);
            border: 1px dashed var(--line);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .input-file-label:active {
            background: var(--line);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>自媒体数据助手</h1>
        <p>记录 · 验证 · 复盘</p>
    </div>
    
    <div class="container">
        <!-- 首页：数据录入 -->
        <div id="page-home" class="tab-content active">
            <div class="grid-2" style="margin-bottom:20px;">
                <div class="stat-card">
                    <div class="num" id="home-total">0</div>
                    <div class="label">总记录</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="home-valid" style="color:var(--success)">0</div>
                    <div class="label">有效内容</div>
                </div>
            </div>
            
            <div class="section-title">录入数据</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">日期</label>
                    <input type="date" id="record-date" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">标题</label>
                    <input type="text" id="record-title" class="form-input" placeholder="内容标题">
                </div>
                <div class="form-group">
                    <label class="form-label">方向</label>
                    <select id="record-direction" class="form-select">
                        <option value="">选择方向</option>
                        <option value="心理学">心理学</option>
                        <option value="经济学">经济学</option>
                        <option value="认知提升">认知提升</option>
                        <option value="行为经济学">行为经济学</option>
                        <option value="社会观察">社会观察</option>
                        <option value="人际关系">人际关系</option>
                        <option value="自我成长">自我成长</option>
                        <option value="博弈论">博弈论</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">平台</label>
                    <select id="record-platform" class="form-select">
                        <option value="抖音">抖音</option>
                        <option value="小红书">小红书</option>
                        <option value="B站">B站</option>
                    </select>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">播放</label>
                        <input type="number" id="record-views" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">评论</label>
                        <input type="number" id="record-comments" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">点赞</label>
                        <input type="number" id="record-likes" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">收藏</label>
                        <input type="number" id="record-saves" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">转发</label>
                    <input type="number" id="record-shares" class="form-input" placeholder="0">
                </div>
                <div class="form-group">
                    <label class="form-label">备注</label>
                    <textarea id="record-script" class="form-input" rows="2" placeholder="可选"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveRecord()">保存</button>
            </div>
        </div>
        
        <!-- 评论页 -->
        <div id="page-comment" class="tab-content">
            <div class="section-title">评论分析</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">选择内容</label>
                    <select id="comment-record" class="form-select">
                        <option value="">请先录入内容</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">评论内容</label>
                    <textarea id="comment-content" class="form-input" rows="2"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">类型</label>
                    <div style="display:flex;gap:16px;flex-wrap:wrap;padding-top:4px;">
                        <label style="font-size:14px;cursor:pointer;"><input type="radio" name="comment-type" value="需求型" checked style="margin-right:6px;">需求型</label>
                        <label style="font-size:14px;cursor:pointer;"><input type="radio" name="comment-type" value="认可型" style="margin-right:6px;">认可型</label>
                        <label style="font-size:14px;cursor:pointer;"><input type="radio" name="comment-type" value="中立" style="margin-right:6px;">中立</label>
                        <label style="font-size:14px;cursor:pointer;"><input type="radio" name="comment-type" value="质疑" style="margin-right:6px;">质疑</label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">用户标签</label>
                    <input type="text" id="comment-user" class="form-input" placeholder="潜在用户/同行/路人">
                </div>
                <button class="btn btn-primary" onclick="saveComment()">保存</button>
            </div>
        </div>
        
        <!-- 方向页 -->
        <div id="page-direction" class="tab-content">
            <div class="section-title">方向验证</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">方向</label>
                    <select id="direction-name" class="form-select">
                        <option value="">选择方向</option>
                        <option value="心理学">心理学</option>
                        <option value="经济学">经济学</option>
                        <option value="认知提升">认知提升</option>
                        <option value="行为经济学">行为经济学</option>
                        <option value="社会观察">社会观察</option>
                        <option value="人际关系">人际关系</option>
                        <option value="自我成长">自我成长</option>
                        <option value="博弈论">博弈论</option>
                    </select>
                </div>
                <div class="stat-row">
                    <div class="form-group">
                        <label class="form-label">内容数量</label>
                        <input type="number" id="direction-count" class="form-input" placeholder="0">
                    </div>
                    <div class="form-group">
                        <label class="form-label">有效内容</label>
                        <input type="number" id="direction-valid" class="form-input" placeholder="0">
                    </div>
                </div>
                <div class="tip-box">有效标准：评论率≥3% 或 收藏率≥2%</div>
                <div class="form-group" style="margin-top:16px;">
                    <label class="form-label">备注</label>
                    <textarea id="direction-note" class="form-input" rows="2"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveDirection()">保存</button>
            </div>
            <div id="direction-list"></div>
        </div>
        
        <!-- 历史页 -->
        <div id="page-history" class="tab-content">
            <div class="section-title">历史记录</div>
            <div id="history-list"></div>
        </div>
        
        <!-- 输出页 -->
        <div id="page-export" class="tab-content">
            <div class="section-title">一键分析</div>
            <div class="card" style="text-align:center;">
                <p style="font-size:13px;color:var(--text2);margin-bottom:16px;">复制全部数据，粘贴发给我分析入库</p>
                <button class="btn-large" onclick="copyAllData()" style="background:var(--success);color:white;">📋 一键复制全部数据</button>
            </div>
            
            <div class="section-title">数据统计</div>
            <div class="grid-2">
                <div class="stat-card">
                    <div class="num" id="valid-count">0</div>
                    <div class="label">有效内容</div>
                </div>
                <div class="stat-card">
                    <div class="num" id="total-count">0</div>
                    <div class="label">总记录</div>
                </div>
            </div>
            
            <div class="section-title">导出备份</div>
            <div class="card">
                <button class="btn-large" onclick="exportData()" style="background:var(--accent);color:white;">📦 导出 JSON</button>
                <button class="btn-large" onclick="exportMarkdown()" style="background:var(--bg);color:var(--text);border:1px solid var(--line);">📝 导出 Markdown</button>
            </div>
            
            <div class="section-title">导入备份</div>
            <div class="card">
                <label class="input-file-label">
                    📁 点击选择文件
                    <input type="file" id="import-file" accept=".json" onchange="importData(event)" style="display:none;">
                </label>
                <p style="font-size:12px;color:var(--text2);margin-top:12px;text-align:center;">支持导入之前导出的JSON备份</p>
            </div>
            
            <div class="section-title">危险区域</div>
            <div class="card danger-zone">
                <button class="btn-small btn-danger" onclick="clearAllData()">清空所有数据</button>
            </div>
        </div>
        
        <!-- 周复盘页 -->
        <div id="page-weekly" class="tab-content">
            <div class="section-title">周复盘</div>
            <div class="card">
                <div class="form-group">
                    <label class="form-label">周期</label>
                    <div style="display:flex;gap:12px;align-items:center;">
                        <input type="date" id="week-start" class="form-input" style="flex:1;">
                        <span style="color:var(--text2)">至</span>
                        <input type="date" id="week-end" class="form-input" style="flex:1;">
                    </div>
                </div>
                <div id="weekly-stats" class="tip-box" style="margin-bottom:16px;">
                    选择周期后自动统计
                </div>
                <div class="form-group">
                    <label class="form-label">本周重点内容</label>
                    <textarea id="week-focus" class="form-input" rows="2" placeholder="本周做了哪些内容？"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">有效内容分析</label>
                    <textarea id="week-analysis" class="form-input" rows="2" placeholder="哪些内容表现好？"></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">下周计划</label>
                    <textarea id="week-plan" class="form-input" rows="2" placeholder="下周方向调整？"></textarea>
                </div>
                <button class="btn btn-primary" onclick="saveWeekly()">保存</button>
            </div>
            <div id="weekly-history"></div>
        </div>
    </div>
    
    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home', this)">
            <div class="icon">📝</div>
            <div class="label">录入</div>
        </div>
        <div class="nav-item" onclick="switchTab('comment', this)">
            <div class="icon">💬</div>
            <div class="label">评论</div>
        </div>
        <div class="nav-item" onclick="switchTab('direction', this)">
            <div class="icon">🧭</div>
            <div class="label">方向</div>
        </div>
        <div class="nav-item" onclick="switchTab('history', this)">
            <div class="icon">📋</div>
            <div class="label">历史</div>
        </div>
        <div class="nav-item" onclick="switchTab('export', this)">
            <div class="icon">📤</div>
            <div class="label">输出</div>
        </div>
        <div class="nav-item" onclick="switchTab('weekly', this)">
            <div class="icon">📅</div>
            <div class="label">周复盘</div>
        </div>
    </div>

<script>
    const KEYS = {
        records: 'media_records',
        comments: 'media_comments', 
        directions: 'media_directions',
        weeklyReviews: 'media_weekly_reviews'
    };
    
    const DIRECTIONS = ['心理学', '经济学', '认知提升', '行为经济学', '社会观察', '人际关系', '自我成长', '博弈论'];
    
    function getData(key) {
        const data = localStorage.getItem(KEYS[key] || key);
        return data ? JSON.parse(data) : [];
    }
    
    function saveData(key, data) {
        localStorage.setItem(KEYS[key] || key, JSON.stringify(data));
    }
    
    function formatNumber(num) {
        if (num >= 10000) return (num / 10000).toFixed(1) + 'w';
        if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
        return num;
    }
    
    function switchTab(name, el) {
        document.querySelectorAll('.tab-content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
        document.getElementById('page-' + name).classList.add('active');
        el.classList.add('active');
        
        if (name === 'history') loadHistory();
        if (name === 'home') updateHome();
        if (name === 'comment') updateCommentSelect();
        if (name === 'direction') loadDirections();
        if (name === 'weekly') loadWeeklyStats();
        if (name === 'export') updateExportStats();
    }
    
    function updateHome() {
        const records = getData('records');
        document.getElementById('record-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('home-total').textContent = records.length;
        document.getElementById('home-valid').textContent = records.filter(r => r.isValid).length;
    }
    
    function saveRecord() {
        const record = {
            id: Date.now(),
            date: document.getElementById('record-date').value,
            title: document.getElementById('record-title').value,
            direction: document.getElementById('record-direction').value,
            platform: document.getElementById('record-platform').value,
            views: parseInt(document.getElementById('record-views').value) || 0,
            comments: parseInt(document.getElementById('record-comments').value) || 0,
            likes: parseInt(document.getElementById('record-likes').value) || 0,
            saves: parseInt(document.getElementById('record-saves').value) || 0,
            shares: parseInt(document.getElementById('record-shares').value) || 0,
            script: document.getElementById('record-script').value,
            createdAt: new Date().toISOString()
        };
        
        if (!record.title || !record.views) {
            alert('请填写标题和播放数');
            return;
        }
        
        record.commentRate = record.views > 0 ? (record.comments / record.views * 100).toFixed(2) : 0;
        record.saveRate = record.views > 0 ? (record.saves / record.views * 100).toFixed(2) : 0;
        record.isValid = parseFloat(record.commentRate) >= 3 || parseFloat(record.saveRate) >= 2;
        
        const records = getData('records');
        records.push(record);
        saveData('records', records);
        
        document.getElementById('record-title').value = '';
        document.getElementById('record-views').value = '';
        document.getElementById('record-comments').value = '';
        document.getElementById('record-likes').value = '';
        document.getElementById('record-saves').value = '';
        document.getElementById('record-shares').value = '';
        document.getElementById('record-script').value = '';
        document.getElementById('record-direction').value = '';
        
        updateHome();
        alert('保存成功' + (record.isValid ? ' ✓ 有效内容' : ''));
    }
    
    function updateCommentSelect() {
        const records = getData('records');
        const select = document.getElementById('comment-record');
        select.innerHTML = '<option value="">请选择内容</option>';
        records.forEach(r => {
            select.innerHTML += `<option value="${r.id}">${r.title}</option>`;
        });
    }
    
    function saveComment() {
        const comment = {
            id: Date.now(),
            recordId: document.getElementById('comment-record').value,
            content: document.getElementById('comment-content').value,
            type: document.querySelector('input[name="comment-type"]:checked').value,
            userLabel: document.getElementById('comment-user').value,
            createdAt: new Date().toISOString()
        };
        
        const comments = getData('comments');
        comments.push(comment);
        saveData('comments', comments);
        
        document.getElementById('comment-content').value = '';
        document.getElementById('comment-user').value = '';
        alert('已保存');
    }
    
    function saveDirection() {
        const direction = {
            id: Date.now(),
            name: document.getElementById('direction-name').value,
            count: parseInt(document.getElementById('direction-count').value) || 0,
            valid: parseInt(document.getElementById('direction-valid').value) || 0,
            note: document.getElementById('direction-note').value,
            createdAt: new Date().toISOString()
        };
        
        direction.validRate = direction.count > 0 ? (direction.valid / direction.count * 100).toFixed(0) : 0;
        
        const directions = getData('directions');
        directions.push(direction);
        saveData('directions', directions);
        
        document.getElementById('direction-name').value = '';
        document.getElementById('direction-count').value = '';
        document.getElementById('direction-valid').value = '';
        document.getElementById('direction-note').value = '';
        
        loadDirections();
        alert('已保存');
    }
    
    function loadDirections() {
        const directions = getData('directions');
        const container = document.getElementById('direction-list');
        
        if (directions.length === 0) {
            container.innerHTML = '';
            return;
        }
        
        let html = '<div class="section-title">验证记录</div>';
        directions.slice(-10).reverse().forEach(d => {
            html += `<div class="record-item">
                <div class="record-header">
                    <span class="record-title">${d.name}</span>
                    <button class="btn-small" onclick="deleteDirection(${d.id})">删除</button>
                </div>
                <div class="record-meta">
                    有效率 ${d.validRate}% | ${d.valid}/${d.count}条
                    ${d.validRate >= 50 ? '<span class="tag tag-valid">有效</span>' : '<span class="tag tag-invalid">待观察</span>'}
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }
    
    function deleteDirection(id) {
        if (!confirm('确定删除？')) return;
        let directions = getData('directions');
        directions = directions.filter(d => d.id !== id);
        saveData('directions', directions);
        loadDirections();
    }
    
    function loadHistory() {
        const records = getData('records');
        const container = document.getElementById('history-list');
        
        if (records.length === 0) {
            container.innerHTML = '<div class="card" style="text-align:center;color:var(--text2);">暂无记录</div>';
            return;
        }
        
        let html = '';
        records.slice().reverse().forEach(r => {
            html += `<div class="record-item">
                <div class="record-header">
                    <span class="record-title">${r.title}</span>
                    <button class="btn-small" onclick="deleteRecord(${r.id})">删除</button>
                </div>
                <div class="record-meta">
                    ${r.date} | ${r.direction || '-'} | ${r.platform} | 播放${formatNumber(r.views)}
                    ${r.isValid ? '<span class="tag tag-valid">有效</span>' : '<span class="tag tag-invalid">待验证</span>'}
                </div>
                <div class="record-meta">
                    评论率${r.commentRate}% | 收藏率${r.saveRate}%
                </div>
            </div>`;
        });
        container.innerHTML = html;
    }
    
    function deleteRecord(id) {
        if (!confirm('确定删除？')) return;
        let records = getData('records');
        records = records.filter(r => r.id !== id);
        saveData('records', records);
        loadHistory();
    }
    
    function copyAllData() {
        const data = {
            records: getData('records'),
            comments: getData('comments'),
            directions: getData('directions'),
            weeklyReviews: getData('weeklyReviews')
        };
        
        const stats = {
            总记录数: data.records.length,
            有效内容: data.records.filter(r => r.isValid).length,
            评论数: data.comments.length,
            方向验证: data.directions.length,
            周复盘: data.weeklyReviews.length
        };
        
        let text = `📊 自媒体数据报告\n`;
        text += `📅 ${new Date().toLocaleDateString('zh-CN')}\n\n`;
        text += `=== 统计 ===\n`;
        Object.entries(stats).forEach(([k, v]) => text += `${k}: ${v}\n`);
        
        text += `\n=== 内容记录 ===\n`;
        data.records.forEach(r => {
            text += `\n【${r.title}】\n`;
            text += `${r.date} | ${r.direction} | ${r.platform}\n`;
            text += `播放${r.views} | 评论${r.comments}(${r.commentRate}%) | 收藏${r.saves}(${r.saveRate}%)\n`;
            text += `${r.isValid ? '✅有效' : '⏳待验证'}\n`;
        });
        
        text += `\n=== 评论 ===\n`;
        const commentTypes = {};
        data.comments.forEach(c => {
            commentTypes[c.type] = (commentTypes[c.type] || 0) + 1;
        });
        Object.entries(commentTypes).forEach(([k, v]) => text += `${k}: ${v}条\n`);
        
        text += `\n=== JSON ===\n`;
        text += JSON.stringify(data, null, 2);
        
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:200px;opacity:1;z-index:9999;font-size:16px;';
        document.body.appendChild(textarea);
        textarea.focus();
        textarea.select();
        
        try {
            document.execCommand('copy');
            alert('✅ 已复制！粘贴发给我分析入库。');
        } catch (err) {
            alert('复制失败，请手动选择复制');
        }
        
        document.body.removeChild(textarea);
    }
    
    function exportData() {
        const data = {
            version: '2.3',
            exportTime: new Date().toISOString(),
            records: getData('records'),
            comments: getData('comments'),
            directions: getData('directions'),
            weeklyReviews: getData('weeklyReviews')
        };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `media-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
        alert('已导出');
    }
    
    function exportMarkdown() {
        const records = getData('records');
        let md = '# 自媒体数据记录\n\n';
        records.forEach(r => {
            md += `## ${r.title}\n`;
            md += `- 日期：${r.date}\n`;
            md += `- 方向：${r.direction}\n`;
            md += `- 平台：${r.platform}\n`;
            md += `- 播放：${r.views}\n`;
            md += `- 评论：${r.comments} (${r.commentRate}%)\n`;
            md += `- 收藏：${r.saves} (${r.saveRate}%)\n`;
            md += `- 有效：${r.isValid ? '是' : '否'}\n\n`;
        });
        
        const blob = new Blob([md], { type: 'text/markdown' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `media-records-${new Date().toISOString().split('T')[0]}.md`;
        a.click();
        URL.revokeObjectURL(url);
    }
    
    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = JSON.parse(e.target.result);
                if (data.records) saveData('records', data.records);
                if (data.comments) saveData('comments', data.comments);
                if (data.directions) saveData('directions', data.directions);
                if (data.weeklyReviews) saveData('weeklyReviews', data.weeklyReviews);
                alert('导入成功');
                location.reload();
            } catch (err) {
                alert('导入失败：文件格式错误');
            }
        };
        reader.readAsText(file);
    }
    
    function updateExportStats() {
        const records = getData('records');
        document.getElementById('valid-count').textContent = records.filter(r => r.isValid).length;
        document.getElementById('total-count').textContent = records.length;
    }
    
    function clearAllData() {
        if (!confirm('确定清空所有数据？')) return;
        if (!confirm('真的要清空吗？此操作不可恢复！')) return;
        
        localStorage.removeItem(KEYS.records);
        localStorage.removeItem(KEYS.comments);
        localStorage.removeItem(KEYS.directions);
        localStorage.removeItem(KEYS.weeklyReviews);
        
        alert('已清空');
        location.reload();
    }
    
    function loadWeeklyStats() {
        const start = document.getElementById('week-start').value;
        const end = document.getElementById('week-end').value;
        const container = document.getElementById('weekly-stats');
        
        if (!start || !end) {
            container.innerHTML = '选择周期后自动统计';
            return;
        }
        
        const records = getData('records');
        let html = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">';
        
        DIRECTIONS.forEach(dir => {
            const filtered = records.filter(r => r.direction === dir && r.date >= start && r.date <= end);
            const views = filtered.reduce((sum, r) => sum + (r.views || 0), 0);
            const valid = filtered.filter(r => r.isValid).length;
            
            html += `<div style="text-align:center;padding:8px;background:var(--bg);border-radius:8px;">
                <div style="font-size:11px;color:var(--text2)">${dir}</div>
                <div style="font-size:16px;font-weight:600">${filtered.length}</div>
                <small style="color:var(--text2)">有效${valid}</small>
            </div>`;
        });
        
        html += '</div>';
        container.innerHTML = html;
        loadWeeklyHistory();
    }
    
    function saveWeekly() {
        const start = document.getElementById('week-start').value;
        const end = document.getElementById('week-end').value;
        if (!start || !end) {
            alert('请选择周期');
            return;
        }
        
        const reviews = getData('weeklyReviews');
        reviews.push({
            id: Date.now(),
            weekStart: start,
            weekEnd: end,
            focus: document.getElementById('week-focus').value,
            analysis: document.getElementById('week-analysis').value,
            plan: document.getElementById('week-plan').value,
            createdAt: new Date().toISOString()
        });
        saveData('weeklyReviews', reviews);
        
        document.getElementById('week-focus').value = '';
        document.getElementById('week-analysis').value = '';
        document.getElementById('week-plan').value = '';
        
        loadWeeklyHistory();
        alert('已保存');
    }
    
    function loadWeeklyHistory() {
        const container = document.getElementById('weekly-history');
        const reviews = getData('weeklyReviews');
        
        if (reviews.length === 0) {
            container.innerHTML = '';
            return;
        }
        
        let html = '<div class="section-title">历史周复盘</div>';
        reviews.slice(-5).reverse().forEach(r => {
            html += `<div class="record-item">
                <div class="record-header">
                    <span class="record-title">${r.weekStart} ~ ${r.weekEnd}</span>
                    <button class="btn-small" onclick="deleteWeekly(${r.id})">删除</button>
                </div>
                <div class="record-meta">${r.focus || '无重点'}</div>
            </div>`;
        });
        container.innerHTML = html;
    }
    
    function deleteWeekly(id) {
        if (!confirm('确定删除？')) return;
        let reviews = getData('weeklyReviews');
        reviews = reviews.filter(r => r.id !== id);
        saveData('weeklyReviews', reviews);
        loadWeeklyHistory();
    }
    
    updateHome();
</script>
</body>
</html>
